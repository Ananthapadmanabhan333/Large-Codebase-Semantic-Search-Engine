version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aether_user
      POSTGRES_PASSWORD: aether_password
      POSTGRES_DB: aether_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - qdrant
      - redis
      - rabbitmq

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    command: celery -A apps.api.worker worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - qdrant
      - redis
      - rabbitmq

  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
